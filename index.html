<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORD 速查列表</title>
  <link rel="stylesheet" href="css/styles.css?v=260617002">
</head>

<body data-page="lookup">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">ORD 航海王隨機防禦</div>
        <div class="brand-subtitle">updated. 2026/06/16</div>
      </div>
      <nav class="nav-tabs" aria-label="主要導覽">
        <a class="nav-link" data-page="lookup" href="index.html">速查列表</a>
        <a class="nav-link" data-page="tree" href="tree.html">合成樹</a>
        <a class="nav-link" style="display: none;" data-page="maintenance" href="maintenance.html">資料維護</a>
        <a class="nav-link" target="_blank" href="https://ordsearch.net/mix">官網</a>
      </nav>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h1 class="panel-title">速查列表</h1>
        <p class="panel-desc">支援直接搜尋角色 / 素材。名稱可點擊快速回查，功能按鈕可切到合成樹頁。</p>
      </div>
      <div class="panel-body">
        <div class="controls-grid">
          <label class="field-group">
            <span class="field-label">稀有度</span>
            <select id="levelFilter" class="field-select"></select>
          </label>
          <label class="field-group">
            <span class="field-label">搜尋</span>
            <input id="searchInput" class="field-input" type="text" placeholder="輸入中文、英文、韓文、或材料">
          </label>
          <div class="field-group">
            <span class="field-label">操作</span>
            <div class="controls-actions">
              <button id="clearButton" type="button" class="secondary">重置條件</button>
            </div>
          </div>
        </div>

        <div class="summary-bar">
          <div id="summaryText" class="summary-text">載入中...</div>
          <div class="helper-text">提示：點角色名或材料可直接把關鍵字帶回搜尋框。</div>
        </div>

        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th>稀有度</th>
                <th>名稱</th>
                <th>所需材料</th>
                <th>金鑰</th>
                <th>備註</th>
                <th>功能</th>
              </tr>
            </thead>
            <tbody id="lookupTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script src="js/ord_data.js?v=260617002"></script>
  <script src="js/app.js?v=260617002"></script>
</body>

</html>
