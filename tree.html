<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORD 合成樹</title>
  <link rel="stylesheet" href="css/tom-select.css">
  <link rel="stylesheet" href="css/styles.css?v=260618003">
</head>

<body data-page="tree">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">合成樹</div>
        <div class="brand-subtitle"></div>
      </div>
      <nav class="nav-tabs" aria-label="主要導覽">
        <a class="nav-link" data-page="lookup" href="index.html">速查列表</a>
        <a class="nav-link" data-page="tree" href="tree.html">合成樹</a>
        <a class="nav-link" data-page="comp" href="comp.html">隊伍組成</a>
        <a class="nav-link" style="display: none;" data-page="maintenance" href="maintenance.html">資料維護</a>
      </nav>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h1 class="panel-title">合成樹</h1>
        <p class="panel-desc">呈現角色的合成樹結構</p>
      </div>
      <div class="panel-body">
        <div class="controls-grid">
          <label class="field-group">
            <span class="field-label">稀有度</span>
            <select id="treeLevelFilter" class="field-select"></select>
          </label>
          <label class="field-group">
            <span class="field-label">角色名稱</span>
            <select id="treeSearchSelect" class=""></select>
          </label>
          <div class="field-group">
            <span class="field-label">操作</span>
            <div class="controls-actions">
              <button id="loadTreeButton" type="button">展開</button>
              <button id="resetTreeSearchButton" type="button">重置條件</button>
            </div>
          </div>
        </div>

        <div class="summary-bar">
          <div id="treeResultTitle" class="summary-text"></div>
          <div class="helper-text"></div>
        </div>

        <div class="tree-panel-stack" style="margin-top: 18px;">
          <div id="treeRootSummary"></div>
          <div id="downwardContainer"></div>
          <div class="controls-actions">
            <button id="toggleUpwardButton" type="button" class="secondary is-hidden">顯示向上 1 層</button>
          </div>
          <div id="upwardContainer"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/ord_data.js?v=260618003"></script>
  <script src="js/tom-select.complete.min.js"></script>
  <script src="js/shared/app-shared.js?v=260618003"></script>
  <script src="js/pages/tree-page.js?v=260618003"></script>
  <script src="js/app.js?v=260618003"></script>
</body>

</html>
