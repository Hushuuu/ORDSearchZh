<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隊伍組成 - ORD</title>
    <link rel="stylesheet" href="css/styles.css?v=260621002">
</head>

<body data-page="comp">
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-title">自訂隊伍組成</div>
                <div class="brand-subtitle"></div>
            </div>
            <nav class="nav-tabs" aria-label="主要導覽">
                <a class="nav-link" data-page="lookup" href="index.html">速查列表</a>
                <a class="nav-link" data-page="tree" href="tree.html">合成樹</a>
                <a class="nav-link" data-page="comp" href="comp.html">隊伍組成</a>
                <a class="nav-link" data-page="recommend" href="recommend.html">合成推薦</a>
                <a class="nav-link" style="display: none;" data-page="maintenance" href="maintenance.html">資料維護</a>
                <a class="nav-link" target="_blank" href="https://ordsearch.net/mix">官網</a>
            </nav>
        </header>

        <div class="page-grid comp-layout">
            <!-- 隊伍面板 (左側/側邊欄) -->
            <aside class="panel team-panel">
                <div class="panel-header">
                    <h2 class="panel-title">我的隊伍</h2>
                    <p class="panel-desc">選取角色後點擊分析</p>
                </div>
                <div class="panel-body team-body">
                    <div class="team-actions">
                        <button id="analyzeTeamBtn" class="success full-width-btn" type="button">分析隊伍</button>
                        <button id="clearTeamBtn" class="secondary full-width-btn" type="button"
                            style="margin-top: 8px;">清空隊伍</button>
                    </div>
                    <div id="selectedTeamList" class="team-list-container">
                        <div class="empty-state">尚未選取任何角色。</div>
                    </div>

                    <div class="team-divider"></div>

                    <div class="team-materials-section">
                        <h3 class="materials-title">所需基礎材料</h3>
                        <div id="teamMaterialsList" class="materials-list">
                            <span class="muted">無</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 角色篩選與列表 (右側) -->
            <main class="panel characters-panel">
                <div class="panel-header">
                    <h1 class="panel-title">角色庫</h1>
                    <p class="panel-desc"></p>
                </div>
                <div class="panel-body">
                    <!-- 篩選器 -->
                    <div class="comp-controls">
                        <div class="comp-controls-header">
                            <div>
                                <div class="field-label">搜尋條件</div>
                                <div class="helper-text"></div>
                            </div>
                            <div class="controls-actions comp-controls-header-actions">
                                <button id="toggleCompFiltersBtn" class="secondary" type="button" aria-expanded="true"
                                    aria-controls="compFiltersBody">收合條件</button>
                                <button id="resetFiltersBtn" class="secondary" type="button">重置篩選</button>
                            </div>
                        </div>

                        <div id="compFiltersBody" class="comp-controls-body">
                            <div class="controls-row">
                                <div class="field-group">
                                    <span class="field-label">搜尋名稱</span>
                                    <input id="compSearchInput" class="field-input" type="text" placeholder="">
                                </div>
                            </div>

                            <div class="controls-row" style="margin-top: 14px;">
                                <div class="field-group">
                                    <span class="field-label">稀有度</span>
                                    <div id="levelCheckboxGroup" class="checkbox-badge-grid">
                                        <!-- JS 動態生成稀有度複選框 -->
                                    </div>
                                </div>
                            </div>

                            <div class="controls-row" style="margin-top: 14px;">
                                <div class="field-group">
                                    <span class="field-label">技能類型</span>
                                    <div id="skillTypeCheckboxGroup" class="checkbox-badge-grid">
                                        <!-- JS 動態生成技能複選框 -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="controls-row" style="margin-top: 16px;">
                            <div id="compSummaryText" class="summary-text">載入中...</div>
                        </div>
                    </div>

                    <!-- 角色列表 (分組顯示) -->
                    <div id="compCharacterGroups" class="character-groups-stack">
                        <!-- JS 動態生成各等級分組 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/ord_data.js?v=260621002"></script>
    <script src="js/shared/app-shared.js?v=260621002"></script>
    <script src="js/pages/comp-page.js?v=260621002"></script>
    <script src="js/app.js?v=260621002"></script>
</body>

</html>
